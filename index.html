<!Doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport"
      content="width=device-width, 
      initial-scale=1.0">
      <script src="/app.js" defer></script>
      <link rel="stylesheet"
      href="/styles.css">
      <title>Notes</title>

   </head>
   <body>
      <div class="app">
         <h1>Notes</h1>

         <form id="note-form">
            <input id="note-input"
              type="text" 
              placeholder="Write a note"
              required
              />
            <button type="submit">
              Add Note
            </button>
         </form>

         <ul id="notes-list">
         </ul>
        
      </div>

  </body>
</html>
