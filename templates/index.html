<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport"
      content="width=device-width, 
      initial-scale=1.0">
      <script src="/app.js" defer></script>
      <link rel="stylesheet"
      href="/styles.css">
      <title>Concepts</title>

   </head>
   <body>
     <div class="app">
       <div class="header">
         <h1>Concepts</h1>
         <div class="header-controls">
           <div id="sort-ctl-shell">
             <button id="sort-btn" 
               type="button" aria-label=
               "Open sort options">⇅
             </button>
             <div id="sort-select">
               <button id="sort-term-az"
                 class="sort-option"
                 type="button"
                 data-term-sort=
                 "term-az">
                  Term A-Z
               </button>
               <button id="sort-term-za"
                 class="sort-option"
                 type="button"
                 data-term-sort=
                 "term-za">
                  Term Z-A
               </button>
             </div>
           </div>
           <div id="search-ctl-shell">
             <button id="search-btn" 
               type="button" aria-label=
               "Open search">⌕
             </button>
             <input id="search-input"
               type="text"
               placeholder="Search"
               aria-label="search concepts">
           </div>
           <div id="filter-ctl-shell">
             <button id="filter-btn"
               type="button" aria-label=
               "Open filter options">☰
             </button>
             <div id="filter-select">
               <button data-filter="all">
                  All
               </button>
             </div>
           </div>
         </div> 
       </div>
         
         <ul id="concepts-list">
         </ul>
        
      </div>

  </body>
</html>
